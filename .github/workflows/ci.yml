name: CI

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["*"]
  workflow_dispatch:

jobs:
  lint:
    name: linting

    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: prepare python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: create venv
        run: python3.10 -m venv .venv

      - name: run linting
        run: |
          source .venv/bin/activate
          make format lint

  test:
    name: testing

    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: prepare python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: create venv
        run: python3.10 -m venv .venv

      - name: run testing
        run: |
          source .venv/bin/activate
          make test

      - name: store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: .coverage.*
          if-no-files-found: ignore
          overwrite: true
          include-hidden-files: true

  coverage:
    name: test coverages

    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: prepare python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: load artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data
          merge-multiple: true

      - name: run coverage reporting
        run: |
          python -Im pip install coverage[toml]
          python -Im coverage combine
          python -Im coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

  # ensure everything required passed
  required-checks-pass:
    if: always()

    needs:
      - lint
      - coverage

    runs-on: ubuntu-latest

    steps:
      - name: check CI success or failure
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
